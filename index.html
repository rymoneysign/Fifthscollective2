<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIFTHS COLLECTIVE — Links</title>
<meta name="description" content="Fifths Collective — matcha, Chicago. TikTok, Instagram, email." />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --maroon: #7a1830;
    --maroon-deep: #5c0f22;
    --foam: #f3efe6;
    --matcha: #ffffff;
    --ink: #17120f;
    --display: 'Archivo Black', 'Arial Black', sans-serif;
    --body: 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--body);
    background-color: #000000;
    color: var(--foam);
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Signature: the label print. Stacked FIFTHS COLLECTIVE rows, like the cup sticker ── */
  .print {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    padding: 56px 22px 36px;
  }

  /* ── Hero: heavy italic speed wordmark ── */
  .mark { text-align: center; }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--foam);
    margin-bottom: 20px;
    display: inline-block;
  }

  .logo {
    width: min(72vw, 300px);
    height: auto;
    display: inline-block;
  }

  .tagline {
    margin-top: 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--matcha);
    text-align: center;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 36px 0 26px;
    color: rgba(243, 239, 230, 0.7);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(243, 239, 230, 0.3);
  }

  /* ── Link rows: cream label blocks on the maroon print ── */
  .links { display: flex; flex-direction: column; gap: 14px; }

  .link-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 20px;
    background: var(--foam);
    color: var(--ink);
    text-decoration: none;
    border: 2px solid var(--foam);
    transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
  }

  .link-row:hover,
  .link-row:focus-visible {
    background: var(--maroon);
    border-color: var(--maroon);
    color: var(--foam);
    transform: translateY(-2px);
  }

  .link-row:focus-visible {
    outline: 3px solid var(--matcha);
    outline-offset: 3px;
  }

  .link-label { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

  .link-platform {
    font-family: var(--display);
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }

  .link-handle {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.75;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow { font-family: var(--display); font-size: 20px; flex-shrink: 0; }

  /* email row: outlined on maroon */
  .link-row.alt {
    background: transparent;
    color: var(--foam);
    border: 2px solid rgba(243, 239, 230, 0.6);
  }
  .link-row.alt:hover,
  .link-row.alt:focus-visible {
    background: var(--foam);
    color: var(--ink);
    border-color: var(--foam);
  }

  .copy-note {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--matcha);
    min-height: 16px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .copy-note.show { opacity: 1; }

  footer {
    margin-top: auto;
    padding-top: 44px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(243, 239, 230, 0.6);
  }

  .mark, .logo, .tagline, .divider, .link-row, footer { animation: rise 0.55s ease both; }
  .tagline { animation-delay: 0.08s; }
  .divider { animation-delay: 0.16s; }
  .link-row:nth-child(1) { animation-delay: 0.22s; }
  .link-row:nth-child(2) { animation-delay: 0.30s; }
  .link-row:nth-child(3) { animation-delay: 0.38s; }
  footer { animation-delay: 0.5s; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .mark, .logo, .tagline, .divider, .link-row, footer { animation: none; }
    .link-row, .link-row.alt { transition: none; }
  }
</style>
</head>
